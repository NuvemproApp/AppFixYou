name: CI — NuvemPro Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: tests + contract validation ────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: nuvempro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/nuvempro_test
      JWT_SECRET: ci-jwt-secret-32chars-abcdefghij00
      ADMIN_JWT_SECRET: ci-admin-jwt-32chars-xyzuvwabcd00
      NODE_ENV: test
      PORT: 3001
      STRIPE_SECRET_KEY: sk_test_fakekeyforci1234567890
      STRIPE_WEBHOOK_SECRET: whsec_fakekeyforci1234567890
      NUVEMSHOP_APP_ID: "99999"
      NUVEMSHOP_CLIENT_ID: test_client_id
      NUVEMSHOP_CLIENT_SECRET: test_client_secret
      FRONTEND_URL: http://localhost:5173
      ADMIN_FRONTEND_URL: http://localhost:5174
      APP_NAME: TestApp
      APP_SLUG: testapp
      APP_EMAIL: test@testapp.com
      ADMIN_SEED_EMAIL: admin@testapp.com
      ADMIN_SEED_PASSWORD: TestPassword123!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Push schema to test database
        run: cd backend && npx prisma db push --force-reset

      - name: Seed admin data
        run: cd backend && node prisma/seed-admin.js

      - name: Start backend server (background)
        run: cd backend && node src/server.js &

      - name: Wait for server to be ready
        run: |
          echo "Aguardando servidor iniciar..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Servidor pronto!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 2
          done

      - name: Run test suite
        run: cd backend && npm test

  # ─── Frontend: build gate ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend app
        run: |
          cd frontend
          npm ci
          VITE_API_URL=https://example.com VITE_NUVEMSHOP_APP_ID=99999 npm run build

  # ─── Admin Frontend: build gate ──────────────────────────────────────────
  build-admin-frontend:
    name: Admin Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build admin frontend
        run: |
          cd admin-frontend
          npm ci
          VITE_ADMIN_API_URL=https://example.com npm run build
